<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ООО «Караван» — Недвижимость Москва</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:13px;background:#F4F6FA;color:#1a1a2e;min-height:100vh}
  /* NAV */
.nav{position:relative;background:linear-gradient(135deg,#1a3a6e 0%,#1F3864 100%);display:flex;align-items:center;justify-content:center;padding:0 24px;height:64px;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
  .nav-logo{display:none}
.nav-logo-text{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:#fff;font-size:15px;font-weight:700;letter-spacing:.5px;white-space:nowrap;opacity:.95}
  
  .nav-btn{font-size:13px;padding:9px 22px;border-radius:6px;border:none;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.3px;box-shadow:0 2px 5px rgba(0,0,0,.25)}
  .nav-btn:hover{opacity:.85;transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.3)}
  .nav-btn.active{opacity:1;transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,0,0,.4);filter:brightness(1.15)}
  /* Nav button colors */
  .nav-btn-dash{background:#3B82F6;color:#fff}
  .nav-btn-kanban{background:#8B5CF6;color:#fff}
  .nav-btn-table{background:#F59E0B;color:#fff}
  .nav-right{position:absolute;right:24px;top:50%;transform:translateY(-50%);display:flex;gap:8px;align-items:center}
  .nav-date{color:#7EC8E3;font-size:11px}
  .btn-add-nav{background:#16A34A;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer}
  .btn-add-nav:hover{background:#15803D}
  .btn-csv-nav{background:transparent;color:#B8C8E8;border:1px solid rgba(255,255,255,.2);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer}
  .btn-csv-nav:hover{background:rgba(255,255,255,.1);color:#fff}
  /* VIEWS */
  .view{display:none;padding:16px 20px}
  .view.active{display:block}
  /* DASHBOARD */
  .dash-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .metric-card{background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #E2E8F0}
  .metric-card .label{font-size:11px;color:#64748B;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
  .metric-card .val{font-size:26px;font-weight:700}
  .metric-card .sub{font-size:11px;color:#94A3B8;margin-top:4px}
  .dash-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .dash-card{background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #E2E8F0}
  .dash-card h3{font-size:12px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
  /* funnel */
  .funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .f-label{font-size:12px;width:180px;flex-shrink:0;color:#334155}
  .f-bar-wrap{flex:1;background:#F1F5F9;border-radius:4px;height:20px;overflow:hidden}
  .f-bar{height:100%;border-radius:4px;transition:width .4s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
  .f-bar span{font-size:10px;font-weight:600;color:#fff}
  .f-count{font-size:12px;font-weight:600;width:20px;text-align:right;color:#475569}
  /* top3 */
  .top3-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F1F5F9}
  .top3-item:last-child{border:none}
  .top3-rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .top3-info{flex:1}
  .top3-addr{font-size:12px;font-weight:500}
  .top3-meta{font-size:11px;color:#64748B}
  .top3-price{font-size:12px;font-weight:600;color:#1F3864}
  /* district chart */
  .dist-bars{display:flex;flex-direction:column;gap:6px}
  .db-row{display:flex;align-items:center;gap:8px}
  .db-name{font-size:11px;width:130px;flex-shrink:0;color:#475569}
  .db-wrap{flex:1;background:#F1F5F9;border-radius:3px;height:14px}
  .db-fill{height:100%;border-radius:3px}
  .db-cnt{font-size:11px;font-weight:600;color:#475569;width:16px;text-align:right}
  /* KANBAN */
  .kb-toolbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .kb-metrics{display:flex;gap:8px;margin-right:auto}
  .km{background:#fff;border:1px solid #E2E8F0;border-radius:6px;padding:4px 12px;font-size:11px;display:flex;align-items:center;gap:5px}
  .km .v{font-weight:600;font-size:13px}
  .tbtn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid #CBD5E1;background:#fff;cursor:pointer;color:#475569;transition:all .12s}
  .tbtn:hover{background:#F8FAFC}
  .tbtn.on{background:#EFF6FF;border-color:#3B82F6;color:#1D4ED8;font-weight:500}
  .board{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
  .col{min-width:220px;width:220px;flex-shrink:0}
  .col-hd{padding:8px 10px;border-radius:8px;font-size:11px;font-weight:600;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .col-body{min-height:200px;border-radius:8px;padding:4px;border:2px dashed transparent;transition:all .12s}
  .col-body.over{border-color:#94A3B8;background:#F8FAFC}
  .card{background:#fff;border:1px solid #E2E8F0;border-left:3px solid #94A3B8;border-radius:10px;padding:10px 12px;cursor:grab;margin-bottom:6px;transition:opacity .1s}
  .card:active{cursor:grabbing;opacity:.5}
  .card.dragging{opacity:.3}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
  .card-addr{font-size:12px;font-weight:600;flex:1;margin-right:6px;line-height:1.3}
  .card-addr a:hover{text-decoration:underline!important;color:#1a1a2e!important}
  .card-addr a .link-arrow{color:#3B82F6;font-size:11px;opacity:.7}
  .card-addr a:hover .link-arrow{opacity:1}
  .pill{font-size:10px;padding:2px 6px;border-radius:6px;white-space:nowrap}
  .rooms-badge{font-size:10px;padding:2px 7px;border-radius:6px;background:#F0FDF4;color:#15803D;font-weight:700;border:1px solid #BBF7D0;margin-left:4px}
  .card-row{display:flex;gap:8px;font-size:11px;color:#64748B;margin-bottom:3px}
  .card-price{font-size:13px;font-weight:700;color:#1F3864;margin-top:4px}
  .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
  .dist-tag{font-size:10px;padding:2px 7px;border-radius:6px}
  .stars{color:#F59E0B;font-size:11px;letter-spacing:1px}
  .card-acts{display:none;gap:4px}
  .card:hover .card-acts{display:flex}
  .ca{font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid #E2E8F0;background:#F8FAFC;cursor:pointer;color:#64748B}
  .ca:hover{background:#fff;color:#1a1a2e}
  .ca.del:hover{color:#DC2626;border-color:#FCA5A5}
  .empty-col{text-align:center;color:#CBD5E1;font-size:11px;padding:24px 6px}
  /* TABLE */
  .tbl-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .search-inp{padding:6px 10px;border-radius:6px;border:1px solid #CBD5E1;font-size:12px;width:220px;background:#fff}
  .table-wrap{background:#fff;border-radius:10px;border:1px solid #E2E8F0;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:12px}
  thead tr{background:#1F3864}
  th{padding:10px 10px;text-align:left;color:#B8C8E8;font-weight:500;font-size:11px;white-space:nowrap}
  th.sortable{cursor:pointer;user-select:none}
  th.sortable:hover{color:#fff}
  tbody tr{border-bottom:1px solid #F1F5F9;transition:background .1s}
  tbody tr:hover{background:#F8FAFC}
  td{padding:9px 10px;vertical-align:middle}
  .status-badge{font-size:10px;padding:3px 8px;border-radius:6px;white-space:nowrap;font-weight:500}
  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:12px;width:500px;max-width:96vw;max-height:92vh;overflow-y:auto;padding:24px}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .modal-header h3{font-size:15px;font-weight:600}
  .modal-close{font-size:20px;cursor:pointer;color:#94A3B8;line-height:1;background:none;border:none}
  .modal-close:hover{color:#475569}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .fgrid.full{grid-template-columns:1fr}
  .field label{display:block;font-size:11px;color:#64748B;margin-bottom:4px;font-weight:500}
  .field input,.field select,.field textarea{width:100%;padding:7px 10px;border:1px solid #CBD5E1;border-radius:6px;font-size:12px;background:#fff;color:#1a1a2e;font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#3B82F6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
  .field textarea{resize:vertical;min-height:60px}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid #F1F5F9}
  .btn-cancel{padding:8px 16px;border-radius:6px;border:1px solid #CBD5E1;background:#fff;font-size:12px;cursor:pointer;color:#475569}
  .btn-save{padding:8px 20px;border-radius:6px;border:none;background:#1F3864;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
  .btn-save:hover{background:#162E56}
  /* utils */
  .tag-kv{background:#DBEAFE;color:#1E40AF}
  .tag-ap{background:#FCE7F3;color:#9D174D}
  @media(max-width:700px){.dash-metrics{grid-template-columns:1fr 1fr}.dash-row{grid-template-columns:1fr}}

#modalOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:12px;padding:24px;width:560px;max-width:calc(100vw - 32px);max-height:calc(100vh - 40px);overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);box-sizing:border-box}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-hdr h3{font-size:17px;font-weight:700;color:#1e293b;margin:0}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;line-height:1;padding:4px 8px;border-radius:4px}
.modal-close:hover{color:#1e293b;background:#f1f5f9}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;margin-bottom:0}
.fgrid .full{grid-column:1/-1}
.fg-label{font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px;display:block}
.fg-input{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:13px;color:#1e293b;background:#fff;box-sizing:border-box;outline:none}
.fg-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #f1f5f9}

/* ── MOBILE RESPONSIVE ───────────────────────── */
@media (max-width: 768px) {
  .nav-logo-text { font-size: 13px; left: 12px; }
  .nav-right { right: 12px; gap: 6px; }
  .nav-date { display: none; }
  .btn-csv-nav { display: none; }
  .btn-add-nav { padding: 5px 10px; font-size: 12px; }
  .nav-btn { font-size: 12px; padding: 7px 14px; }
}
@media (max-width: 540px) {
  .nav-logo-text { display: none; }
  .nav-right { display: none; }
  .nav { justify-content: center; padding: 0 8px; }
  .nav-btn { font-size: 12px; padding: 8px 16px; }
}

.btn-avito-nav{background:#00AAFF;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-avito-nav:hover{background:#0088DD}
.avito-import-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center}
.avito-import-overlay.open{display:flex}
.avito-import-box{background:#fff;border-radius:12px;padding:24px;width:500px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.avito-import-box h3{margin:0 0 16px;font-size:16px;color:#1a3a6e}
.avito-import-box input{width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;margin-bottom:12px}
.avito-import-box input:focus{outline:none;border-color:#3B82F6}
.avito-import-hint{font-size:11px;color:#94A3B8;margin-bottom:16px}
.avito-import-actions{display:flex;gap:8px;justify-content:flex-end}
.avito-import-actions button{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500}
.avito-import-cancel{background:#f1f5f9;color:#475569}
.avito-import-go{background:#3B82F6;color:#fff}
.avito-import-go:hover{background:#2563EB}
.avito-import-error{color:#EF4444;font-size:12px;margin-bottom:8px;display:none}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo-text">ООО «Караван»</div>
  <button class="nav-btn nav-btn-dash active" onclick="showView('dash',this)">Дашборд</button>
  <button class="nav-btn nav-btn-kanban" onclick="showView('kanban',this)">Канбан</button>
  <button class="nav-btn nav-btn-table" onclick="showView('table',this)">Таблица</button>
  <div class="nav-right">
    <span class="nav-date" id="navDate"></span>
    <button class="btn-avito-nav" onclick="openAvitoImport()">Авито ↗</button>
    <button class="btn-csv-nav" onclick="exportCSV()">CSV ↓</button>
    <button class="btn-add-nav" onclick="openModal(null)">+ Объект</button>
  </div>
</nav>

<!-- DASHBOARD -->
<div class="view active" id="view-dash">
  <div class="dash-metrics" id="dashMetrics"></div>
  <div class="dash-row">
    <div class="dash-card"><h3>Воронка по статусам</h3><div id="funnel"></div></div>
    <div class="dash-card"><h3>В приоритете</h3><div id="top3"></div></div>
  </div>
  <div class="dash-row">
    <div class="dash-card" style="grid-column:1/-1"><h3>Сводка</h3><div id="summary"></div></div>
  </div>
</div>

<!-- KANBAN -->
<div class="view" id="view-kanban">
  <div class="kb-toolbar">
    <div class="kb-metrics" id="kbMetrics"></div>
    <button class="tbtn on" id="fAll" onclick="ft('')">Все</button>
    <button class="tbtn" id="fKv" onclick="ft('Квартира')">Квартиры</button>
    <button class="tbtn" id="fAp" onclick="ft('Апартаменты')">Апарт.</button>
    

  </div>
  <div class="board" id="board"></div>
</div>

<!-- TABLE -->
<div class="view" id="view-table">
  <div class="tbl-toolbar">
    <input class="search-inp" placeholder="Поиск по адресу, району..." oninput="renderTable()" id="searchInp">
    <select class="search-inp" style="width:150px" id="filterStatus" onchange="renderTable()">
      <option value="">Все статусы</option>
      <option>На проверке</option><option>Осмотр запланирован</option>
      <option>Ожидание ответа</option><option>Приоритет</option><option>Отклонён</option>
    </select>
    <select class="search-inp" style="width:130px" id="filterType" onchange="renderTable()">
      <option value="">Все типы</option><option>Квартира</option><option>Апартаменты</option>
    </select>
    <span style="margin-left:auto;font-size:11px;color:#64748B" id="tblCount"></span>
  </div>
  <div class="table-wrap"><table id="mainTable">
    <thead><tr>
      <th style="width:30px">#</th>
      <th class="sortable" onclick="sortBy('addr')">Адрес ↕</th>
      <th class="sortable" onclick="sortBy('dist')">Район ↕</th>
      <th>Тип</th>
      <th class="sortable" onclick="sortBy('area')">м² ↕</th>
      <th>Этаж</th>
      <th class="sortable" onclick="sortBy('price')">Цена ↕</th>
      <th>₽/м²</th>
      <th>Комнат</th>
      <th class="sortable" onclick="sortBy('stars')">★ ↕</th>
      <th>Метро</th>
      <th>Статус</th>
      <th style="width:60px"></th>
    </tr></thead>
    <tbody id="tableBody"></tbody>
  </table></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
<div class="modal">
  <div class="modal-header">
    <h3 id="modalTitle">Новый объект</h3>
    <button class="modal-close" onclick="closeModal()">×</button>
  </div>
  <div class="fgrid full"><div class="field"><label>Адрес</label><input id="f-addr" placeholder="ул. Тверская, 4"></div></div>
  <div class="fgrid">
    <div class="field"><label>Комнат</label>
      <select id="f-rooms-sel">
        <option value="1">1 комната</option>
        <option value="2" selected>2 комнаты</option>
        <option value="3">3 комнаты</option>
        <option value="4">4 комнаты</option>
        <option value="5">5 комнат</option>
        <option value="6">6 комнат</option>
      </select>
    </div>
    <div class="field"><label>Тип</label>
      <select id="f-type"><option>Квартира</option><option>Апартаменты</option></select>
    </div>
  </div>
  <div class="fgrid">
    <div class="field"><label>Площадь, м²</label><input id="f-area" type="number" min="38" max="150" placeholder="68"></div>
    <div class="field"><label>Этаж / всего</label><input id="f-floor" placeholder="5/9"></div>
  </div>
  <div class="fgrid">
    <div class="field"><label>Цена, млн ₽</label><input id="f-price" type="number" step="0.5" placeholder="47.5"></div>
    <div class="field"><label>Год постройки</label><input id="f-year" type="number" placeholder="1980"></div>
  </div>
  <div class="fgrid">
    <div class="field"><label>Метро</label><input id="f-metro" placeholder="Охотный ряд, 4 мин"></div>
    <div class="field"><label>Источник</label><input id="f-source" placeholder="ЦИАН, Авито..."></div>
  </div>
  <div class="fgrid">
    <div class="field"><label>Оценка дизайна</label>
      <select id="f-stars">
        <option value="1">1 ★</option><option value="2">2 ★★</option>
        <option value="3" selected>3 ★★★</option><option value="4">4 ★★★★</option><option value="5">5 ★★★★★</option>
      </select>
    </div>
    <div class="field"><label>Статус</label>
      <select id="f-status">
        <option value="check">На проверке</option><option value="plan">Осмотр запланирован</option>
        <option value="wait">Ожидание ответа</option><option value="priority">Приоритет</option>
        <option value="rejected">Отклонён</option>
      </select>
    </div>
  </div>
  <div class="fgrid full"><div class="field"><label>Ссылка на объект</label><input id="f-url" placeholder="https://cian.ru/..."></div></div>
  <div class="fgrid full"><div class="field"><label>Комментарий</label><textarea id="f-comment" placeholder="Заметки по объекту..."></textarea></div></div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="closeModal()">Отмена</button>
    <button class="btn-save" onclick="saveModal()">Сохранить</button>
  </div>
</div>
</div>

<script src="data.js?v=7"></script>
<script>

  // Маппинг метро → район
  const METRO_TO_DIST = {
    'Тверская':'Тверской','Чеховская':'Тверской','Пушкинская':'Тверской','Маяковская':'Тверской',
    'Менделеевская':'Тверской','Новослободская':'Тверской','Охотный Ряд':'Тверской','Театральная':'Тверской',
    'Боровицкая':'Арбат','Арбатская':'Арбат','Смоленская':'Арбат',
    'Кропоткинская':'Хамовники','Парк культуры':'Хамовники','Фрунзенская':'Хамовники',
    'Полянка':'Якиманка','Октябрьская':'Якиманка','Третьяковская':'Якиманка',
    'Новокузнецкая':'Замоскворечье','Павелецкая':'Замоскворечье','Добрынинская':'Замоскворечье',

function showView(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');

  if(id==='dash')renderDash();
  if(id==='kanban')renderKanban();
  if(id==='table')renderTable();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function renderDash(){
  const active=cards.filter(c=>c.status!=='rejected');
  const avgP=active.length?Math.round(active.reduce((a,c)=>a+c.price,0)/active.length*10)/10:0;
  const pri=cards.filter(c=>c.status==='priority').length;
  const avgPM=active.length?Math.round(active.reduce((a,c)=>a+pm(c),0)/active.length):0;
  document.getElementById('dashMetrics').innerHTML=`
    <div class="metric-card"><div class="label">Всего объектов</div><div class="val" style="color:#1F3864">${cards.length}</div><div class="sub">За всё время поиска</div></div>
    <div class="metric-card"><div class="label">В активной работе</div><div class="val" style="color:#059669">${active.length}</div><div class="sub">Исключая отклонённые</div></div>
    <div class="metric-card"><div class="label">Приоритетных</div><div class="val" style="color:#D97706">${pri}</div><div class="sub">Требуют решения</div></div>
    <div class="metric-card"><div class="label">Средняя цена</div><div class="val" style="color:#7C3AED">${avgP} <span style="font-size:14px;font-weight:400">млн</span></div><div class="sub">${fmt(avgPM)}k ₽/м²</div></div>`;

  // funnel
  const funnelEl=document.getElementById('funnel');
  const maxC=Math.max(...COLS.map(col=>cards.filter(c=>c.status===col.id).length),1);
  funnelEl.innerHTML=COLS.map(col=>{
    const cnt=cards.filter(c=>c.status===col.id).length;
    const pct=Math.max(8,Math.round(cnt/maxC*100));
    return `<div class="funnel-row">
      <div class="f-label">${col.label}</div>
      <div class="f-bar-wrap"><div class="f-bar" style="width:${pct}%;background:${col.border}"><span>${cnt}</span></div></div>
      <div class="f-count">${cnt}</div>
    </div>`;
  }).join('');

  // top3 — приоритетные объекты
  const top3=cards.filter(c=>c.status==='priority').slice(0,3);
  const rankColors=['#F59E0B','#94A3B8','#CD7F32'];
  document.getElementById('top3').innerHTML=top3.length===0?'<div style="padding:24px;text-align:center;color:#94A3B8;font-size:13px">Нет приоритетных объектов.<br>Перетащите карточки в колонку «Приоритет» (макс. 3)</div>':top3.map((c,i)=>`
    <div class="top3-item">
      <div class="top3-rank" style="background:${rankColors[i]}22;color:${rankColors[i]}">${i+1}</div>
      <div class="top3-info">
        <div class="top3-addr">${c.url?`<a href="${c.url}" target="_blank" style="color:inherit;text-decoration:none">${c.addr} <span style="color:#3B82F6;font-size:10px">↗</span></a>`:c.addr}</div>
        <div class="top3-meta">${c.dist} · ${c.area} м² · ${'★'.repeat(c.stars)}</div>
      </div>
      <div class="top3-price">${c.price} млн</div>
    </div>`).join('');

  // district bars
  const distCount={};
  cards.filter(c=>c.status!=='rejected').forEach(c=>{if(c.dist)distCount[c.dist]=(distCount[c.dist]||0)+1;});
  // summary
  const kv=cards.filter(c=>c.type==='Квартира').length;
  const ap=cards.filter(c=>c.type==='Апартаменты').length;
  const ht=cards.filter(c=>c.style==='Хайтек').length;
  const mn=cards.filter(c=>c.style==='Минимализм').length;
  const minP=Math.min(...cards.map(c=>c.price));
  const maxP=Math.max(...cards.map(c=>c.price));
  document.getElementById('summary').innerHTML=`
    <table style="width:100%;font-size:12px;border-collapse:collapse">
      ${[['Квартир / Апартаментов',`${kv} / ${ap}`],['Диапазон цен',`${minP}–${maxP} млн ₽`],['Районов охвачено',Object.keys(distCount).length],['Обновлено',new Date().toLocaleDateString('ru-RU')]].map(([l,v],i)=>`
      <tr style="border-bottom:1px solid #F1F5F9">
        <td style="padding:7px 0;color:#64748B">${l}</td>
        <td style="padding:7px 0;font-weight:600;text-align:right">${v}</td>
      </tr>`).join('')}
    </table>`;
}

    <div class="card-row" style="color:#94A3B8">${c.dist||''}${c.dist&&c.metro?' · ':''}${c.metro||'—'}</div>
    <div class="card-price">${c.price} млн <span style="font-size:11px;font-weight:400;color:#94A3B8">${pm(c)}k/м²</span></div>
    <div class="card-footer">
      <span style="font-size:10px;color:#94A3B8">${c.source||''}</span>
      <span style="display:flex;align-items:center;gap:6px">
        <span class="stars">${'★'.repeat(c.stars)}${'☆'.repeat(5-c.stars)}</span>
        <span class="card-acts">
          <button class="ca" onclick="openModal(${c.id})">✎</button>
          <button class="ca del" onclick="delCard(${c.id})">✕</button>
        </span>
      </span>
    </div>
  </div>`;
}
function renderKanban(){
  renderKanbanMetrics();
  const v=vis();
  const board=document.getElementById('board');
  board.innerHTML='';
  COLS.forEach(col=>{
    const cc=v.filter(c=>c.status===col.id);
    const el=document.createElement('div');el.className='col';
    el.innerHTML=`<div class="col-hd" style="background:${col.hbg};color:${col.hcol}">
      <span>${col.label}</span><span style="background:${col.border}33;padding:1px 7px;border-radius:10px;font-size:10px">${cc.length}</span>
    </div>
    <div class="col-body" id="cb-${col.id}"
      ondragover="onDO(event,'${col.id}')" ondragleave="onDL('${col.id}')" ondrop="onDrop(event,'${col.id}')">
      ${cc.length?cc.map(cardHTML).join(''):'<div class="empty-col">Нет объектов</div>'}
    </div>`;
    board.appendChild(el);
  });
}
function onDS(e,id){ST.drag=id;setTimeout(()=>{const el=document.getElementById('card-'+id);if(el)el.classList.add('dragging')},0)}
function onDE(){document.querySelectorAll('.col-body').forEach(el=>el.classList.remove('over'));ST.drag=null}
function onDO(e,id){e.preventDefault();document.getElementById('cb-'+id).classList.add('over')}
function onDL(id){document.getElementById('cb-'+id).classList.remove('over')}
function onDrop(e,id){
  e.preventDefault();
  if(ST.drag!=null){const c=cards.find(x=>x.id===ST.drag);if(c){
    if(id==='priority'&&cards.filter(x=>x.status==='priority'&&x.id!==c.id).length>=3){
      alert('Максимум 3 объекта в приоритете');
    }else{c.status=id;save();}
  }}
  renderKanban();
}
function ft(t){ST.type=ST.type===t?'':t;['fAll','fKv','fAp'].forEach(i=>document.getElementById(i).classList.remove('on'));if(!t)document.getElementById('fAll').classList.add('on');if(t==='Квартира')document.getElementById('fKv').classList.add('on');if(t==='Апартаменты')document.getElementById('fAp').classList.add('on');renderKanban()}
function fs(s){ST.style=ST.style===s?'':s;document.getElementById('fHi').classList.toggle('on',ST.style==='Хайтек');document.getElementById('fMn').classList.toggle('on',ST.style==='Минимализм');renderKanban()}
function delCard(id){if(confirm('Удалить объект?')){cards=cards.filter(c=>c.id!==id);save();renderKanban();renderDash()}}

// ── TABLE ─────────────────────────────────────────────────────────────────
function sortBy(col){ST.sortAsc=ST.sortCol===col?!ST.sortAsc:true;ST.sortCol=col;renderTable()}
function renderTable(){
  const q=(document.getElementById('searchInp').value||'').toLowerCase();
  const fs=document.getElementById('filterStatus').value;
  const ft2=document.getElementById('filterType').value;
  let rows=cards.filter(c=>{
    if(q&&!c.addr.toLowerCase().includes(q)&&!c.dist.toLowerCase().includes(q))return false;
    if(fs&&COL2STATUS[c.status]!==fs)return false;
    if(ft2&&c.type!==ft2)return false;
    return true;
  });
  if(ST.sortCol){rows.sort((a,b)=>{const av=a[ST.sortCol],bv=b[ST.sortCol];return ST.sortAsc?(av>bv?1:-1):(av<bv?1:-1)})}
  document.getElementById('tblCount').textContent=`Показано: ${rows.length} из ${cards.length}`;
  const tbody=document.getElementById('tableBody');
  tbody.innerHTML=rows.map((c,i)=>{
    const ss=STATUS_STYLE[COL2STATUS[c.status]]||'';
    const col=dc(c.dist);
    return `<tr>
      <td style="color:#94A3B8">${i+1}</td>
      <td><strong>${c.addr}</strong>${c.url?` <a href="${c.url}" target="_blank" style="color:#3B82F6;font-size:10px">↗</a>`:''}</td>
      <td><span style="color:${col};font-weight:500">${c.dist}</span></td>
      <td><span class="pill ${c.type==='Квартира'?'tag-kv':'tag-ap'}">${c.type}</span></td>
      <td style="text-align:center;font-weight:500">${c.area}</td>
      <td style="text-align:center">${c.floor}</td>
      <td style="font-weight:700;color:#1F3864">${c.price} млн</td>
      <td style="color:#64748B">${pm(c)}k</td>
      <td style="color:#475569">${c.rooms}</td>
      <td style="color:#F59E0B">${'★'.repeat(c.stars)}</td>
      <td style="color:#64748B;font-size:11px">${c.metro||'—'}</td>
      <td><span class="status-badge" style="${ss}">${COL2STATUS[c.status]||c.status}</span></td>
      <td style="white-space:nowrap">
        <button class="ca" onclick="openModal(${c.id})" style="margin-right:3px">✎</button>
        <button class="ca del" onclick="delCard(${c.id})">✕</button>
      </td>
    </tr>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(id){
  var ov=document.getElementById('modalOverlay');if(ov)ov.style.display='flex';
  const overlay=document.getElementById('modalOverlay');
  if(overlay)overlay.style.display='flex';
  const sk='ttk_realty_v4';
  const cards=JSON.parse(localStorage.getItem(sk)||'[]');
  const c=id?cards.find(x=>x.id==id):null;
  window.__editId=id||null;
  const g=x=>document.getElementById(x);
  if(g('f-addr'))g('f-addr').value=c?c.addr:'';
  if(g('f-rooms-sel'))g('f-rooms-sel').value=c?(c.rooms||2):2;
  if(g('f-type'))g('f-type').value=c?(c.type||''):'Квартира';
  if(g('f-area'))g('f-area').value=c?c.area:'';
  if(g('f-floor'))g('f-floor').value=c?c.floor:'';
  if(g('f-price'))g('f-price').value=c?c.price:'';
  if(g('f-year'))g('f-year').value=c?(c.year||2000):'';
  if(g('f-metro'))g('f-metro').value=c?c.metro:'';
  if(g('f-source'))g('f-source').value=c?c.source:'Авито';
  if(g('f-stars'))g('f-stars').value=c?(c.stars||3):3;
  if(g('f-status'))g('f-status').value=c?(c.status||'check'):'check';
  if(g('f-url'))g('f-url').value=c?c.url:'';
  if(g('f-comment'))g('f-comment').value=c?c.comment:'';
  const mt=document.getElementById('modalTitle');
  if(mt)mt.textContent=id?'Редактировать объект':'Новый объект';
}
function saveModal(){
  const addr=document.getElementById('f-addr').value.trim();
  if(!addr){alert('Введите адрес');return}
  const obj={
    id:ST.editId||nextId++,addr,
    rooms:+document.getElementById('f-rooms-sel').value||2,
    type:document.getElementById('f-type').value,
    area:+document.getElementById('f-area').value||50,
    floor:document.getElementById('f-floor').value||'?',
    price:+document.getElementById('f-price').value||0,
    year:+document.getElementById('f-year').value||2000,
    metro:document.getElementById('f-metro').value,
    dist:metroToDist(document.getElementById('f-metro').value),
    source:document.getElementById('f-source').value,
    url:document.getElementById('f-url').value,
    style:document.getElementById('f-style').value,
    stars:+document.getElementById('f-stars').value,
    torg:+document.getElementById('f-torg').value||0,
    status:document.getElementById('f-status').value,
    comment:document.getElementById('f-comment').value,
  };
  if(ST.editId){const i=cards.findIndex(c=>c.id===ST.editId);if(i>=0)cards[i]=obj}
  else cards.push(obj);
  save();closeModal();
  renderDash();renderKanban();renderTable();
}

// ── CSV EXPORT ────────────────────────────────────────────────────────────
function exportCSV(){
  const hdr=['Адрес','Район','Тип','Площадь м²','Этаж','Цена млн','Цена/м² k','Год','Метро','Стиль','Оценка','Торг %','Источник','Статус','Комментарий','Ссылка'];
  const rows=cards.map(c=>[c.addr,c.dist,c.type,c.area,c.floor,c.price,pm(c),c.year,c.metro,c.style,c.stars,c.torg,c.source,COL2STATUS[c.status]||c.status,c.comment,c.url]);
  const csv=[hdr,...rows].map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='ttk_objects_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

// ── AVITO IMPORT ─────────────────────────────────────────────────────────
function openAvitoImport(){
  document.getElementById('avitoImportOverlay').classList.add('open');
  document.getElementById('avitoUrlInput').value='';
  document.getElementById('avitoImportError').style.display='none';
  setTimeout(()=>document.getElementById('avitoUrlInput').focus(),100);
}
function closeAvitoImport(){
  document.getElementById('avitoImportOverlay').classList.remove('open');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeAvitoImport();
});
function parseAvitoUrl(url){
  // Убираем query string
  const clean = url.split('?')[0].trim();
  
  // Комнаты
  const roomsM = clean.match(/\/(\d+)-k\._/);
  const rooms = roomsM ? parseInt(roomsM[1]) : (clean.includes('studiya') ? 0 : 2);
  
  // Тип
  const type = clean.includes('apartament') ? 'Апартаменты' : 'Квартира';
  
  // Площадь — "_87_m_" или "_872_m_" (87.2) или "_1042_m_" (104.2)
  const areaM = clean.match(/_(\d{2,4})_m_/);
  let area = 50;
  if(areaM){
    const raw = areaM[1];
    // 3+ цифр: последняя — дробная (872→87.2, 1042→104.2)
    area = raw.length >= 3 ? parseFloat(raw.slice(0,-1)+'.'+raw.slice(-1)) : parseFloat(raw);
  }
  
  // Этаж/всего — "_5_9_et_" или "_510_et_"
  const floorM = clean.match(/_(\d{1,2})_(\d{1,2})_et_/) || clean.match(/_(\d)(\d{2})_et_/);
  const floor = floorM ? floorM[1]+'/'+floorM[2] : '?/?';
  
  // ID объявления — последнее число
  const idM = clean.match(/_(\d{7,})$/);
  const avitoId = idM ? parseInt(idM[1]) : null;
  
  if(!avitoId) return null;
  
  return {url: clean, rooms, type, area, floor, avitoId};
}
function doAvitoImport(){
  const url = document.getElementById('avitoUrlInput').value.trim();
  const errEl = document.getElementById('avitoImportError');
  errEl.style.display='none';
  
  const parsed = parseAvitoUrl(url);
  if(!parsed){
    errEl.style.display='block';
    return;
  }
  
  closeAvitoImport();
  
  // Открываем стандартную форму с предзаполненными данными
  openModal(null);
  setTimeout(()=>{
    // Заполняем поля
    const sel = (id,val)=>{const el=document.getElementById(id);if(el)el.value=val;};
    const selOpt = (id,val)=>{
      const el=document.getElementById(id);
      if(!el)return;
      const opt=[...el.options].find(o=>o.value===val||o.text===val);
      if(opt)el.value=opt.value;
    };
    
    sel('f-url', parsed.url);
    sel('f-area', parsed.area);
    sel('f-floor', parsed.floor);
    selOpt('f-type', parsed.type);
    
    // Комнаты
    const roomsSel=document.getElementById('f-rooms-sel');
    if(roomsSel){
      const opt=[...roomsSel.options].find(o=>parseInt(o.value)===parsed.rooms);
      if(opt)roomsSel.value=opt.value;
    }
    
    // Фокус на поле Адрес чтобы пользователь заполнил его
    document.getElementById('f-addr').focus();
    
    // Подсвечиваем поля которые нужно заполнить вручную
    ['f-addr','f-price','f-metro'].forEach(id=>{
      const el=document.getElementById(id);
      if(el){el.style.borderColor='#F59E0B';el.placeholder=el.id==='f-addr'?'← Введи адрес из Авито':el.id==='f-price'?'← Введи цену':el.placeholder;}
    });
  }, 150);
}
